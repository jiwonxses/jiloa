name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ============================================================
  # Job : Tests unitaires frontend
  # ============================================================
  test-frontend:
    name: Tests frontend (Jest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm test

  # ============================================================
  # Job : Tests d'intégration backend (Docker Compose)
  # ============================================================
  test-backend:
    name: Tests backend (intégration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build base image
        run: |
          source .env
          
          docker build \
            --build-arg GITHUB_REPO="$GITHUB_REPO" \
            --build-arg RELEASE_TAG="$RELEASE_TAG" \
            --build-arg MODEL_SHA256="$MODEL_SHA256" \
            -t movie-app-base:latest ./base

      - name: Start test stack
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for backend to be healthy
        run: |
          echo "Attente démarrage backend..."
          for i in {1..60}; do
            if curl -sf http://localhost:8001/health > /dev/null; then
              echo "Backend prêt après $i secondes"
              exit 0
            fi
            sleep 5
          done
          echo "Timeout : backend pas prêt après 5 minutes"
          docker compose -f docker-compose.test.yml logs
          exit 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"

      - name: Setup Python
        run: uv python install 3.11

      - name: Install backend dependencies
        working-directory: ./backend
        run: uv sync --frozen

      - name: Run integration tests
        working-directory: ./backend
        run: uv run pytest tests/test_api.py -v

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v